<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px; height: 630px;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f5f7 0%, #e8edf5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,122,255,0.06);
    }
    .bg-circle:nth-child(1) { width: 400px; height: 400px; top: -100px; right: -50px; }
    .bg-circle:nth-child(2) { width: 300px; height: 300px; bottom: -80px; left: -60px; background: rgba(37,211,102,0.06); }
    .content {
      text-align: center;
      z-index: 1;
      position: relative;
    }
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: #007AFF;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-name {
      font-size: 52px;
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: -0.03em;
    }
    .tagline {
      font-size: 26px;
      color: #555;
      font-weight: 400;
      margin-bottom: 40px;
      line-height: 1.4;
    }
    .features {
      display: flex;
      gap: 32px;
      justify-content: center;
    }
    .feature {
      background: white;
      border-radius: 16px;
      padding: 20px 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .feature-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .feature span {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    .url {
      position: absolute;
      bottom: 28px;
      font-size: 18px;
      color: #007AFF;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>
  <div class="content">
    <div class="logo-row">
      <div class="logo-icon">
        <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="10" stroke="white" stroke-width="2"/>
          <circle cx="16" cy="16" r="5" stroke="white" stroke-width="2"/>
          <circle cx="16" cy="16" r="2" fill="white"/>
          <line x1="16" y1="4" x2="16" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="16" y1="22" x2="16" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="16" x2="10" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="22" y1="16" x2="28" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-name">SniperAuto</div>
    </div>
    <div class="tagline">Vos deals auto, livrés sur WhatsApp.<br>Surveillance Auto1 24h/24 pour les pros.</div>
    <div class="features">
      <div class="feature">
        <div class="feature-dot" style="background:#007AFF;"></div>
        <span>Scan en temps réel</span>
      </div>
      <div class="feature">
        <div class="feature-dot" style="background:#25D366;"></div>
        <span>Alertes WhatsApp</span>
      </div>
      <div class="feature">
        <div class="feature-dot" style="background:#5856D6;"></div>
        <span>Filtrage IA intelligent</span>
      </div>
    </div>
  </div>
  <div class="url">sniperauto.fr</div>
</body>
</html>
